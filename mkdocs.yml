site_name: 我的 CS 笔记
site_url: https://你的GitHub用户名.github.io/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - blog
  - tags

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 博客:
      - 总览: blog/index.md
  - 标签: tags.md
  - 环境配置:
      - WSL: env/wsl.md
      - Linux: env/linux.md
      - VS Code: env/vscode.md
  - Web 开发:
      - 总览: web/index.md
  - 算法:
      - 总览: algorithms/index.md
  - 课程:
      - 总览: courses/index.md
      - 计算机网络: courses/network.md
      - 操作系统: courses/os.md
      - 数据库: courses/database.md
  - 排错记录:
      - 模板: troubleshooting/template.md