site_name: lucas的 CS 笔记
site_url: https://stdlibstring.github.io/

theme:
  name: material
  custom_dir: overrides
  language: zh

  icon:
    logo: material/code-tags

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

  font:
    text: Noto Sans SC
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - blog
  - tags

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: index.md
  - 博客:
      - 总览: blog/index.md
  - 标签: tags.md
  - 环境配置:
      - WSL: env/wsl.md
      - Linux: env/linux.md
      - VS Code: env/vscode.md
  - Web 开发:
      - 总览: web/index.md
  - 算法:
      - 总览: algorithms/index.md
  - 课程:
      - 总览: courses/index.md
      - 计算机网络: courses/network.md
      - 操作系统: courses/os.md
      - 数据库: courses/database.md
  - 排错记录:
      - 模板: troubleshooting/template.md